<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e2e4ed;
            --muted: #6b7280;
            --blue: #4f8ef7;
            --orange: #f7834f;
            --green: #4fda8e;
            --red: #f7504f;
            --yellow: #f7c94f;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-wrap: wrap;
        }

        .topbar h1 {
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
        }

        .main {
            padding: 1.5rem 2rem;
        }

        .droprow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .dropzone {
            border: 1.5px dashed var(--border);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }

        .dropzone:hover,
        .dropzone.drag {
            border-color: var(--blue);
            background: rgba(79, 142, 247, 0.06);
        }

        .dropzone.loaded-a {
            border-color: var(--blue);
            border-style: solid;
        }

        .dropzone.loaded-b {
            border-color: var(--orange);
            border-style: solid;
        }

        .dropzone input {
            display: none;
        }

        .dz-label {
            color: var(--muted);
            font-size: 0.875rem;
        }

        .dz-name {
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 0.2rem;
        }

        .dz-clear {
            position: absolute;
            top: 0.5rem;
            right: 0.75rem;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }

        .dz-clear:hover {
            color: var(--text);
        }

        .dz-meta {
            color: var(--muted);
            font-size: 0.75rem;
            margin-top: 0.15rem;
        }

        .warning {
            background: rgba(247, 201, 79, 0.1);
            border: 1px solid rgba(247, 201, 79, 0.35);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            color: var(--yellow);
            font-size: 0.8rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .tabs {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.6rem;
        }

        .tab {
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--muted);
            background: none;
            transition: all 0.15s;
        }

        .tab:hover {
            color: var(--text);
            border-color: var(--border);
        }

        .tab.active {
            color: var(--text);
            background: var(--surface);
            border-color: var(--border);
        }

        .pane {
            display: none;
        }

        .pane.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.1rem 1.4rem;
        }

        .card h3 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--muted);
        }

        .card-table {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th {
            text-align: left;
            color: var(--muted);
            font-weight: 500;
            padding: 0.55rem 0.9rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 0.5rem 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.025);
        }

        .faster {
            color: var(--green);
            font-weight: 600;
        }

        .slower {
            color: var(--red);
            font-weight: 600;
        }

        .same {
            color: var(--muted);
        }

        /* Aggregate row styling */
        tr.agg-row td {
            color: var(--muted);
            font-style: italic;
        }

        tr.agg-row td:first-child {
            padding-left: 1.6rem;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 4rem 2rem;
            font-size: 0.9rem;
        }

        .btn {
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .btn:hover {
            border-color: var(--blue);
        }
    </style>
</head>

<body>

    <div class="topbar">
        <h1>Benchmark Viewer</h1>
        <button class="btn" onclick="document.getElementById('dz-a-input').click()">Открыть файл</button>
        <button class="btn" id="btn-compare" onclick="document.getElementById('dz-b-input').click()"
            style="display:none">+ Сравнить с...</button>
    </div>

    <div class="main">
        <div class="droprow" id="droprow">
            <div class="dropzone" id="dz-a" onclick="document.getElementById('dz-a-input').click()"
                ondragover="onDragOver(event,'a')" ondragleave="onDragLeave('a')" ondrop="onDrop(event,'a')">
                <input type="file" id="dz-a-input" accept=".json" onchange="loadFile(event,'a')">
                <button class="dz-clear" id="dz-a-clear" style="display:none" onclick="clearSlot(event,'a')">✕</button>
                <div class="dz-label" id="dz-a-label">Перетащи JSON или нажми чтобы выбрать</div>
                <div class="dz-name" id="dz-a-name"></div>
                <div class="dz-meta" id="dz-a-meta"></div>
            </div>
            <div class="dropzone" id="dz-b" style="display:none" onclick="document.getElementById('dz-b-input').click()"
                ondragover="onDragOver(event,'b')" ondragleave="onDragLeave('b')" ondrop="onDrop(event,'b')">
                <input type="file" id="dz-b-input" accept=".json" onchange="loadFile(event,'b')">
                <button class="dz-clear" id="dz-b-clear" style="display:none" onclick="clearSlot(event,'b')">✕</button>
                <div class="dz-label" id="dz-b-label">Второй прогон для сравнения</div>
                <div class="dz-name" id="dz-b-name"></div>
                <div class="dz-meta" id="dz-b-meta"></div>
            </div>
        </div>

        <div class="warning" id="scaling-warn">
            ⚠ CPU scaling включён — результаты могут быть зашумлены.
            Для точных замеров: <code>sudo cpupower frequency-set --governor performance</code>
        </div>

        <div id="content">
            <div class="empty" id="empty-state">Загрузи JSON файл с результатами бенчмарка</div>
        </div>
    </div>

    <script>
        const state = { a: null, b: null };

        // ============================================================= drop I/O ===
        function onDragOver(e, slot) { e.preventDefault(); document.getElementById(`dz-${slot}`).classList.add('drag'); }
        function onDragLeave(slot) { document.getElementById(`dz-${slot}`).classList.remove('drag'); }
        function onDrop(e, slot) { e.preventDefault(); onDragLeave(slot); const f = e.dataTransfer.files[0]; if (f) readFile(f, slot); }
        function loadFile(e, slot) { const f = e.target.files[0]; if (f) readFile(f, slot); e.target.value = ''; }

        function readFile(file, slot) {
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    state[slot] = { data, filename: file.name };
                    onLoaded(slot);
                } catch { alert('Не удалось распарсить JSON: ' + file.name); }
            };
            reader.readAsText(file);
        }

        function clearSlot(e, slot) {
            e.stopPropagation();
            state[slot] = null;
            const dz = document.getElementById(`dz-${slot}`);
            dz.classList.remove(`loaded-${slot}`);
            document.getElementById(`dz-${slot}-name`).textContent = '';
            document.getElementById(`dz-${slot}-meta`).textContent = '';
            document.getElementById(`dz-${slot}-clear`).style.display = 'none';
            document.getElementById(`dz-${slot}-label`).textContent =
                slot === 'a' ? 'Перетащи JSON или нажми чтобы выбрать' : 'Второй прогон для сравнения';
            if (slot === 'b') {
                document.getElementById('dz-b').style.display = 'none';
                document.getElementById('btn-compare').style.display = '';
            }
            render();
        }

        function onLoaded(slot) {
            const { data, filename } = state[slot];
            const ctx = data.context || {};
            const dz = document.getElementById(`dz-${slot}`);
            dz.classList.add(`loaded-${slot}`);
            document.getElementById(`dz-${slot}-label`).textContent = slot === 'a' ? 'Прогон A' : 'Прогон B';
            document.getElementById(`dz-${slot}-name`).textContent = filename;
            document.getElementById(`dz-${slot}-meta`).textContent =
                [ctx.host_name, ctx.date].filter(Boolean).join(' · ');
            document.getElementById(`dz-${slot}-clear`).style.display = '';
            if (slot === 'a') {
                document.getElementById('dz-b').style.display = '';
                document.getElementById('btn-compare').style.display = 'none';
                document.getElementById('scaling-warn').style.display =
                    ctx.cpu_scaling_enabled === true ? '' : 'none';
            }
            render();
        }

        // ============================================================== parsing ===
        const AGG_SUFFIXES = ['_mean', '_median', '_stddev', '_cv'];
        const AGG_SUFFIX_RE = /_(mean|median|stddev|cv)$/;

        function isAggregate(name) { return AGG_SUFFIX_RE.test(name); }
        function hasAggregates(data) { return (data.benchmarks || []).some(bm => isAggregate(bm.name)); }

        // Returns { chartGroups, tableGroups }
        // chartGroups: for graphs — mean rows (if agg) or plain rows
        // tableGroups: for tables — all rows grouped, with aggregates attached
        function parseBenchmarks(data) {
            const bms = data.benchmarks || [];
            const hasAgg = hasAggregates(data);

            // Build a map: baseName -> { plain: bm, mean: bm, median: bm, stddev: bm, cv: bm }
            const byBase = {};

            for (const bm of bms) {
                let baseName, suffix;
                const m = bm.name.match(/^(.+?)_(mean|median|stddev|cv)$/);
                if (m) {
                    baseName = m[1];
                    suffix = m[2];
                } else {
                    baseName = bm.name;
                    suffix = null;
                }
                byBase[baseName] ??= { plain: null, mean: null, median: null, stddev: null, cv: null };
                if (suffix) {
                    byBase[baseName][suffix] = bm;
                } else {
                    byBase[baseName].plain = bm;
                }
            }

            // Helper: make a row object from a benchmark entry + optional stddev
            function makeRow(bm, baseName, stddevBm = null) {
                const parts = baseName.split('/');
                const group = parts.slice(0, 2).join('/');
                const atoms = [...parts].reverse().find(p => /^\d+$/.test(p));
                return {
                    group,
                    atoms: atoms ? +atoms : null,
                    time_ns: bm.real_time ?? 0,
                    cpu_ns: bm.cpu_time ?? 0,
                    ips: bm.items_per_second ?? null,
                    iters: bm.iterations ?? 0,
                    name: baseName,
                    stddev_ns: stddevBm ? (stddevBm.real_time ?? null) : null,
                };
            }

            // chartGroups: use mean if hasAgg, otherwise plain
            // tableGroups: always all rows (plain + all agg variants)
            const chartGroups = {};
            const tableGroups = {};  // key: group, value: array of tableEntry

            for (const [baseName, variants] of Object.entries(byBase)) {
                // Skip pure aggregate-only entries that have no plain (those are the _mean etc. themselves)
                // baseName here is already the clean name (without suffix)

                const parts = baseName.split('/');
                const group = parts.slice(0, 2).join('/');
                const atoms = [...parts].reverse().find(p => /^\d+$/.test(p));
                const atomsNum = atoms ? +atoms : null;

                // ---- chart row ----
                let chartBm = null;
                if (hasAgg && variants.mean) {
                    chartBm = variants.mean;
                } else if (!hasAgg && variants.plain) {
                    chartBm = variants.plain;
                } else if (variants.plain) {
                    // hasAgg but no mean? fallback to plain
                    chartBm = variants.plain;
                }

                if (chartBm) {
                    chartGroups[group] ??= [];
                    chartGroups[group].push({
                        atoms: atomsNum,
                        time_ns: chartBm.real_time ?? 0,
                        cpu_ns: chartBm.cpu_time ?? 0,
                        ips: chartBm.items_per_second ?? null,
                        iters: chartBm.iterations ?? 0,
                        name: baseName,
                        stddev_ns: variants.stddev ? (variants.stddev.real_time ?? null) : null,
                    });
                }

                // ---- table rows ----
                tableGroups[group] ??= [];

                // If there are aggregates, show plain row (the actual run) + all agg variants
                // If no aggregates at all, show plain row only
                if (hasAgg) {
                    // show plain run row if exists
                    if (variants.plain) {
                        tableGroups[group].push({
                            kind: 'plain',
                            label: baseName,
                            atoms: atomsNum,
                            time_ns: variants.plain.real_time ?? 0,
                            cpu_ns: variants.plain.cpu_time ?? 0,
                            ips: variants.plain.items_per_second ?? null,
                            iters: variants.plain.iterations ?? 0,
                        });
                    }
                    // show all aggregate variants
                    for (const suf of ['mean', 'median', 'stddev', 'cv']) {
                        if (variants[suf]) {
                            const bm = variants[suf];
                            tableGroups[group].push({
                                kind: 'agg',
                                label: `${baseName}_${suf}`,
                                aggSuffix: suf,
                                atoms: atomsNum,
                                time_ns: bm.real_time ?? 0,
                                cpu_ns: bm.cpu_time ?? 0,
                                ips: bm.items_per_second ?? null,
                                iters: bm.iterations ?? 0,
                            });
                        }
                    }
                } else {
                    if (variants.plain) {
                        tableGroups[group].push({
                            kind: 'plain',
                            label: baseName,
                            atoms: atomsNum,
                            time_ns: variants.plain.real_time ?? 0,
                            cpu_ns: variants.plain.cpu_time ?? 0,
                            ips: variants.plain.items_per_second ?? null,
                            iters: variants.plain.iterations ?? 0,
                        });
                    }
                }
            }

            // Sort within groups by atoms
            for (const g of Object.values(chartGroups)) g.sort((a, b) => (a.atoms ?? 0) - (b.atoms ?? 0));
            for (const g of Object.values(tableGroups)) g.sort((a, b) => {
                if ((a.atoms ?? 0) !== (b.atoms ?? 0)) return (a.atoms ?? 0) - (b.atoms ?? 0);
                // plain before aggregates
                const order = { plain: 0, agg: 1 };
                return (order[a.kind] ?? 0) - (order[b.kind] ?? 0);
            });

            return { chartGroups, tableGroups, hasAgg };
        }

        // ============================================================= formatting ===
        function fmtTime(ns) {
            if (ns >= 1e9) return [(ns / 1e9).toFixed(3), 'с'];
            if (ns >= 1e6) return [(ns / 1e6).toFixed(3), 'мс'];
            if (ns >= 1e3) return [(ns / 1e3).toFixed(3), 'мкс'];
            return [ns.toFixed(1), 'нс'];
        }
        function fmtIps(ips) {
            if (!ips) return '—';
            if (ips >= 1e9) return (ips / 1e9).toFixed(2) + ' G/s';
            if (ips >= 1e6) return (ips / 1e6).toFixed(2) + ' M/s';
            if (ips >= 1e3) return (ips / 1e3).toFixed(1) + ' K/s';
            return ips.toFixed(0) + ' /s';
        }
        function smartUnit(rows_a, rows_b = []) {
            const times = [...rows_a, ...rows_b].map(r => r.time_ns).filter(Boolean);
            if (!times.length) return [1, 'нс'];
            const median = times.slice().sort((a, b) => a - b)[Math.floor(times.length / 2)];
            if (median >= 1e9) return [1e9, 'с'];
            if (median >= 1e6) return [1e6, 'мс'];
            if (median >= 1e3) return [1e3, 'мкс'];
            return [1, 'нс'];
        }

        // ============================================================== rendering ===
        let activeTab = 'charts';
        const chartInstances = [];

        function showTab(id) {
            activeTab = id;
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`pane-${id}`).classList.add('active');
            document.querySelector(`.tab[data-tab="${id}"]`).classList.add('active');
        }

        function render() {
            chartInstances.forEach(c => c.destroy());
            chartInstances.length = 0;

            const content = document.getElementById('content');
            const empty = document.getElementById('empty-state');

            if (!state.a) {
                content.innerHTML = '';
                content.appendChild(empty);
                return;
            }

            const parsed_a = parseBenchmarks(state.a.data);
            const parsed_b = state.b ? parseBenchmarks(state.b.data) : null;

            const isCompare = !!state.b;

            // Determine mode for charts and compare table
            // bothHaveAgg: both runs have aggregates → charts show mean, compare shows mean vs mean
            // neitherHaveAgg or mismatch: charts/compare show plain (as before)
            const aHasAgg = parsed_a.hasAgg;
            const bHasAgg = parsed_b ? parsed_b.hasAgg : false;
            const bothHaveAgg = aHasAgg && bHasAgg;

            // For charts: use chartGroups if both have agg (or only A and no B), else use tableGroups plain rows
            // Rule summary:
            //   - no agg anywhere → charts plain, tables plain, compare plain
            //   - only A has agg → charts plain (all), tables full (with agg), compare plain (all)
            //   - both have agg → charts mean only, tables full (with agg), compare mean vs mean
            const useAggForCharts = bothHaveAgg || (aHasAgg && !isCompare);

            const allGroups_chart = [...new Set([
                ...Object.keys(parsed_a.chartGroups),
                ...(parsed_b ? Object.keys(parsed_b.chartGroups) : [])
            ])].sort();

            const allGroups_table = [...new Set([
                ...Object.keys(parsed_a.tableGroups),
                ...(parsed_b ? Object.keys(parsed_b.tableGroups) : [])
            ])].sort();

            content.innerHTML = `
    <div class="tabs">
      <button class="tab active" data-tab="charts" onclick="showTab('charts')">Графики</button>
      <button class="tab" data-tab="table" onclick="showTab('table')">Таблица</button>
      ${isCompare ? '<button class="tab" data-tab="compare" onclick="showTab(\'compare\')">Сравнение</button>' : ''}
    </div>
    <div class="pane active" id="pane-charts">
      <div class="grid" id="charts-grid"></div>
    </div>
    <div class="pane" id="pane-table">
      <div class="card-table">
        <table><thead><tr>
          <th>Бенчмарк</th><th>Атомов</th>
          <th>Реальное время</th><th>CPU время</th>
          <th>items/s</th><th>Итераций</th>
        </tr></thead><tbody id="tbody-table"></tbody></table>
      </div>
    </div>
    ${isCompare ? `
    <div class="pane" id="pane-compare">
      <div class="card-table">
        <table><thead><tr>
          <th>Бенчмарк</th><th>Атомов</th>
          <th>${state.a.filename}</th>
          <th>${state.b.filename}</th>
          <th>Δ%</th>
        </tr></thead><tbody id="tbody-compare"></tbody></table>
      </div>
    </div>` : ''}
  `;

            if (document.querySelector(`.tab[data-tab="${activeTab}"]`)) {
                showTab(activeTab);
            } else {
                activeTab = 'charts';
            }

            // ---- charts ----
            const grid = document.getElementById('charts-grid');

            // Decide which data to use for charts per group
            for (const group of allGroups_chart) {
                let rows_a, rows_b;

                if (useAggForCharts) {
                    // use mean/aggregate rows for charts
                    rows_a = parsed_a.chartGroups[group] ?? [];
                    rows_b = parsed_b ? (parsed_b.chartGroups[group] ?? []) : [];
                } else {
                    // use plain rows for charts (extract from tableGroups)
                    rows_a = (parsed_a.tableGroups[group] ?? []).filter(r => r.kind === 'plain');
                    rows_b = parsed_b ? (parsed_b.tableGroups[group] ?? []).filter(r => r.kind === 'plain') : [];
                }

                const [div, unit] = smartUnit(rows_a, rows_b);

                const datasets = [];
                if (rows_a.length) datasets.push({
                    label: state.a.filename,
                    data: rows_a.map(r => ({ x: r.atoms, y: +(r.time_ns / div).toFixed(3) })),
                    borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,0.12)',
                    tension: 0.3, pointRadius: 5,
                });
                if (rows_b && rows_b.length) datasets.push({
                    label: state.b.filename,
                    data: rows_b.map(r => ({ x: r.atoms, y: +(r.time_ns / div).toFixed(3) })),
                    borderColor: '#f7834f', backgroundColor: 'rgba(247,131,79,0.12)',
                    tension: 0.3, pointRadius: 5,
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${group}</h3><canvas></canvas>`;
                grid.appendChild(card);

                const chart = new Chart(card.querySelector('canvas'), {
                    type: 'line',
                    data: { datasets },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: isCompare, labels: { color: '#9ca3af', font: { size: 11 } } },
                            tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} ${unit}` }, mode: 'index' },
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                title: { display: true, text: 'Атомов', color: '#6b7280' },
                                ticks: { color: '#6b7280' },
                                grid: { color: 'rgba(255,255,255,0.05)' },
                            },
                            y: {
                                title: { display: true, text: `Время, ${unit}`, color: '#6b7280' },
                                ticks: { color: '#6b7280' },
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                beginAtZero: true,
                            },
                        },
                    },
                });
                chartInstances.push(chart);
            }

            // ---- table (full — all rows including aggregates) ----
            const tbody = document.getElementById('tbody-table');

            // Show A rows, then B rows (if comparing and B exists)
            const slotsForTable = isCompare
                ? [{ parsed: parsed_a, label: state.a.filename }, { parsed: parsed_b, label: state.b.filename }]
                : [{ parsed: parsed_a, label: null }];

            for (const { parsed, label } of slotsForTable) {
                for (const group of allGroups_table) {
                    const rows = parsed.tableGroups[group] ?? [];
                    for (const r of rows) {
                        const [rt, ru] = fmtTime(r.time_ns);
                        const [ct, cu] = fmtTime(r.cpu_ns);
                        const isAgg = r.kind === 'agg';
                        const tr = document.createElement('tr');
                        if (isAgg) tr.classList.add('agg-row');
                        // Show filename prefix only when comparing
                        const nameCell = label ? `<span style="color:var(--muted);font-size:0.75em">[${label}]</span> ${r.label}` : r.label;
                        tr.innerHTML = `
          <td>${nameCell}</td>
          <td>${r.atoms ?? '—'}</td>
          <td>${rt} ${ru}</td>
          <td>${ct} ${cu}</td>
          <td>${fmtIps(r.ips)}</td>
          <td>${r.iters}</td>`;
                        tbody.appendChild(tr);
                    }
                }
            }

            // ---- compare table ----
            if (isCompare) {
                const cbody = document.getElementById('tbody-compare');

                // Determine what to compare:
                // bothHaveAgg → compare mean rows (chartGroups, keyed by name)
                // otherwise   → compare plain rows (tableGroups plain, keyed by name)
                for (const group of allGroups_table) {
                    let rows_a_cmp, rows_b_cmp;

                    if (bothHaveAgg) {
                        // Compare aggregate variants: mean, median, stddev, cv
                        // Build map: baseName+suffix → row from tableGroups
                        const map_a = Object.fromEntries(
                            (parsed_a.tableGroups[group] ?? []).map(r => [r.label, r])
                        );
                        const map_b = Object.fromEntries(
                            (parsed_b.tableGroups[group] ?? []).map(r => [r.label, r])
                        );
                        const allLabels = [...new Set([...Object.keys(map_a), ...Object.keys(map_b)])];
                        // Sort: plain first, then agg; within agg by suffix order
                        const suffixOrder = { plain: -1, mean: 0, median: 1, stddev: 2, cv: 3 };
                        allLabels.sort((la, lb) => {
                            const ra = map_a[la] || map_b[la];
                            const rb = map_a[lb] || map_b[lb];
                            const ao = ra.kind === 'agg' ? (suffixOrder[ra.aggSuffix] ?? 9) : -1;
                            const bo = rb.kind === 'agg' ? (suffixOrder[rb.aggSuffix] ?? 9) : -1;
                            if ((map_a[la]?.atoms ?? 0) !== (map_a[lb]?.atoms ?? 0))
                                return (map_a[la]?.atoms ?? 0) - (map_a[lb]?.atoms ?? 0);
                            return ao - bo;
                        });

                        const [div, unit] = smartUnit(
                            parsed_a.tableGroups[group] ?? [],
                            parsed_b.tableGroups[group] ?? []
                        );

                        for (const label of allLabels) {
                            const ra = map_a[label], rb = map_b[label];
                            const ta = ra ? ra.time_ns : null;
                            const tb = rb ? rb.time_ns : null;

                            let deltaCell = '—';
                            if (ta && tb) {
                                const pct = ((tb - ta) / ta * 100).toFixed(1);
                                const cls = pct < -1 ? 'faster' : pct > 1 ? 'slower' : 'same';
                                const sign = pct > 0 ? '+' : '';
                                deltaCell = `<span class="${cls}">${sign}${pct}%</span>`;
                            }

                            const isAgg = (ra || rb).kind === 'agg';
                            const atoms = ra?.atoms ?? rb?.atoms;
                            const tr = document.createElement('tr');
                            if (isAgg) tr.classList.add('agg-row');
                            tr.innerHTML = `
              <td>${label}</td>
              <td>${atoms ?? '—'}</td>
              <td>${ta ? fmtTime(ta).join(' ') : '—'}</td>
              <td>${tb ? fmtTime(tb).join(' ') : '—'}</td>
              <td>${deltaCell}</td>`;
                            cbody.appendChild(tr);
                        }
                    } else {
                        // Plain compare: use plain rows keyed by atoms
                        const plain_a = (parsed_a.tableGroups[group] ?? []).filter(r => r.kind === 'plain');
                        const plain_b = (parsed_b.tableGroups[group] ?? []).filter(r => r.kind === 'plain');
                        const map_a = Object.fromEntries(plain_a.map(r => [String(r.atoms), r]));
                        const map_b = Object.fromEntries(plain_b.map(r => [String(r.atoms), r]));
                        const commonAtoms = [...new Set([...Object.keys(map_a), ...Object.keys(map_b)])].sort((a, b) => +a - +b);

                        for (const atoms of commonAtoms) {
                            const ra = map_a[atoms], rb = map_b[atoms];
                            const ta = ra ? ra.time_ns : null;
                            const tb = rb ? rb.time_ns : null;

                            let deltaCell = '—';
                            if (ta && tb) {
                                const pct = ((tb - ta) / ta * 100).toFixed(1);
                                const cls = pct < -1 ? 'faster' : pct > 1 ? 'slower' : 'same';
                                const sign = pct > 0 ? '+' : '';
                                deltaCell = `<span class="${cls}">${sign}${pct}%</span>`;
                            }

                            const tr = document.createElement('tr');
                            tr.innerHTML = `
              <td>${group}</td>
              <td>${atoms}</td>
              <td>${ta ? fmtTime(ta).join(' ') : '—'}</td>
              <td>${tb ? fmtTime(tb).join(' ') : '—'}</td>
              <td>${deltaCell}</td>`;
                            cbody.appendChild(tr);
                        }
                    }
                }
            }
        }
    </script>
</body>
